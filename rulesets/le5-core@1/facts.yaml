# OpenGalois v3 fact catalog (ruleset-specific)
# Source of truth for verifier type-checking of claims.
#
# Normative: predicates, arity, and arg kinds MUST match this file for the active ruleset.

ruleset_id: le5-core@1
version: 1

# Object kinds referenced here are defined in docs/objects.md
kinds:
  - PolyQQ
  - MPolyQQ
  - RatQQ
  - PolyQQList
  - RadicalExpr
  - RadicalExprList
  - GroupId
  - IntZ

predicates:
  # Reducibility / factorization
  IrreducibleQQ:
    args: [PolyQQ]
    doc: "f is irreducible in QQ[x]."

  FactorizationMonicQQ:
    args: [PolyQQ, PolyQQList, RatQQ]
    doc: "f = unit * Π factors[i] in QQ[x], with each factor monic and deg>=1."

  # Normalization (parity with v2 normalize.depressed_monic_QQ)
  DepressedMonicEq:
    args: [PolyQQ, PolyQQ]
    doc: "g is the depressed-monic normalization of f over QQ, as defined by le5-core@1."

  GaloisGroup:
    args: [PolyQQ, GroupId]
    doc: "G is a Galois group of polynomial f over QQ."

  SolvableByRadicals:
    args: [PolyQQ]
    doc: "f is solvable by radicals over QQ."

  NonSolvableByRadicals:
    args: [PolyQQ]
    doc: "f is not solvable by radicals over QQ."

  RadicalRoots:
    args: [PolyQQ, RadicalExprList]
    doc: "roots is the canonical ordered list of roots of f expressed by radicals under the rule-specific scheme."

  Degree:
    args: [PolyQQ, IntZ]
    doc: "The degree of f is n."

  Discriminant:
    args: [PolyQQ, RatQQ]
    doc: "`D` is the discriminant of the polynomial `f`."

  SqrtQQ:
    args: [RatQQ, RatQQ]
    doc: "k is a square root of q in QQ (i.e. k^2=q)."

  IsSquareQQ:
    args: [RatQQ]
    doc: "q is a square in QQ."

  NonSquareQQ:
    args: [RatQQ]
    doc: "q is not a square in QQ."

  DiscSquareQQ:
    args: [PolyQQ]
    doc: "The discriminant of f is a square in QQ."

  DiscNonSquareQQ:
    args: [PolyQQ]
    doc: "The discriminant of f is not a square in QQ."

  ResolventQQ:
    args: [PolyQQ, PolyQQ, MPolyQQ]
    doc: "R is the specialized resolvent over QQ of p at f."
