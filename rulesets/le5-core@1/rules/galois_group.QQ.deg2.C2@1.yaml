id: galois_group.QQ.deg2.C2@1
ruleset: le5-core@1

claim_pattern:
  pred: GaloisGroup
  args: [PolyQQ, GroupId]

premise_patterns:
  - pred: Degree
    bind:
      claim_arg_0: premise_arg_0
    constants:
      premise_arg_1:
        kind: IntZ
        value: "2"
  - pred: IrreducibleQQ
    bind:
      claim_arg_0: premise_arg_0

evidence_schema: null

check_mode: recompute

checker:
  steps:
    - "Require a verified premise Degree(f, 2) bound to the same f as the claim (premise_arg_1 must be IntZ('2'))."
    - "Require a verified premise IrreducibleQQ(f) bound to the same f as the claim."
    - "Decode f canonically as a PolyQQ."
    - "Decode G canonically as a GroupId (system='smallgroup')."
    - "Require (G.order, G.index) == (2, 1)."
    - "Accept."

errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_TYPE
  - E_GROUP_MISMATCH