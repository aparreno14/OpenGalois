id: radical_roots.QQ.reducible.compose@2
ruleset: le5-core@1

claim_pattern:
  pred: RadicalRoots
  args: [PolyQQ, RadicalExprList]

premise_patterns:
  - pred: FactorizationMonicQQ
    bind:
      claim_arg_0: premise_arg_0
  - pred: RadicalRoots

evidence_schema: null

check_mode: recompute

checker:
  steps:
    - "Require a verified premise FactorizationMonicQQ(f, factors, unit) bound to the same polynomial f as in the claim."
    - "Decode factors as a PolyQQList and form the order-preserving list of distinct factor refs occurring in factors.items."
    - "For each distinct factor g, require a verified premise RadicalRoots(g, roots_g)."
    - "Recompute the expected RadicalExprList for f by concatenating the certified root lists roots_g in the exact order of factor occurrences in factors.items. Repeated factor occurrences repeat the same root list."
    - "Decode the claimed RadicalExprList and compare it to the recomputed list by exact structural equality of RadicalExpr payloads."
    - "Accept."

errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_TYPE
  - E_SIDE_CONDITION
  - E_MISMATCH
