id: radical_roots.QQ.deg5.mcclintock.depressed_monic@1
ruleset: le5-core@1

claim_pattern:
  pred: RadicalRoots
  args: [PolyQQ, RadicalExprList]

premise_patterns:
  - pred: Degree
    bind:
      claim_arg_0: premise_arg_0
    constants:
      premise_arg_1:
        kind: IntZ
        value: "5"
  - pred: IrreducibleQQ
    bind:
      claim_arg_0: premise_arg_0
  - pred: DepressedMonicEq
    bind:
      claim_arg_0: premise_arg_1
  - pred: ResolventQQ
    bind:
      claim_arg_0: premise_arg_1
  - pred: FactorizationMonicQQ
    # the polynomial argument is checked indirectly against the R from ResolventQQ(R,g,p)

evidence_schema: null

check_mode: recompute

checker:
  steps:
    - "Require verified premises Degree(g,5), IrreducibleQQ(g), and DepressedMonicEq(f,g) for some f."
    - "Require a verified premise ResolventQQ(R,g,p) for the same g, with p equal to the canonical MPolyQQ for the Dummit F20 sextic family."
    - "Require a verified premise FactorizationMonicQQ(R, factors, unit) for the same sextic resolvent R."
    - "Require unit = 1."
    - "Scan factors.items in order and locate a monic linear factor."
    - "Extract its rational root theta."
    - "Decode g canonically as a monic depressed quintic g(t) = t^5 + 10 C t^3 + 10 D t^2 + 5 E t + f."
    - "Run the canonical depressed-monic McClintock builder on (g, theta)."
    - "Accept iff the claimed RadicalExprList equals the recomputed ordered list by exact structural equality of RadicalExpr payloads."

errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_TYPE
  - E_SIDE_CONDITION
  - E_BAD_RESOLVENT_FAMILY
  - E_BAD_FACTORIZATION
  - E_EXCEPTION
  - E_MISMATCH
