id: galois_group.QQ.reducible.single_nonlinear.inherit@1
ruleset: le5-core@1

claim_pattern:
  pred: GaloisGroup
  args: [PolyQQ, GroupId]

premise_patterns:
  - pred: FactorizationMonicQQ
    bind:
      claim_arg_0: premise_arg_0
  - pred: Degree
  - pred: IrreducibleQQ
  - pred: GaloisGroup
    bind:
      claim_arg_1: premise_arg_1

evidence_schema: null

check_mode: theorem

checker:
  steps:
    - "Require a verified premise FactorizationMonicQQ(f, factors, unit) bound to the same f as in the claim."
    - "Decode factors as PolyQQList and require len(factors.items) >= 2."
    - "Form the order-preserving list of distinct factor refs occurring in factors.items."
    - "For each such factor ref h, require a verified premise Degree(h,n_h)."
    - "Require that exactly one listed factor g satisfy n_g > 1, and that every remaining listed factor satisfy Degree(l,1)."
    - "Require a verified premise IrreducibleQQ(g)."
    - "Require a verified premise GaloisGroup(g,G) where G is the same group object as in the claim."
    - "Accept."

errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_TYPE
  - E_SIDE_CONDITION
