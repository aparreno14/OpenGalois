id: irreducible.QQ.deg5_recompute@1
ruleset: le5-core@1

claim_pattern:
  pred: IrreducibleQQ
  args: [PolyQQ]

premise_patterns:
  - pred: Degree
    bind:
      claim_arg_0: premise_arg_0

evidence_schema: null

check_mode: recompute

checker:
  steps:
    - "Require a verified premise Degree(f,n) bound to the same f as the claim."
    - "Decode f (PolyQQ) canonically from $input or objects."
    - "Side condition: deg(f) in {2,3,4,5}. Reject otherwise."
    - "Let u be the leading coefficient of f. Form the monic polynomial f_m = f / u."
    - "Run the deterministic glass-box le5 factorization procedure factorize_le5(f_m)."
    - "Accept iff factorize_le5 returns exactly [f_m] (no non-trivial factors)."

errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_TYPE
  - E_SIDE_CONDITION
  - E_EXCEPTION
  - E_NOT_IRREDUCIBLE