id: galois_group.QQ.lift.depressed_monic@1
ruleset: le5-core@1

claim_pattern:
  pred: GaloisGroup
  args: [PolyQQ, GroupId]

premise_patterns:
  - pred: DepressedMonicEq
    bind:
      claim_arg_0: premise_arg_0
  - pred: GaloisGroup
    bind:
      claim_arg_1: premise_arg_1
    # the polynomial argument is checked indirectly against the g from DepressedMonicEq(f,g)

evidence_schema: null

check_mode: theorem

checker:
  steps:
    - "Require a verified premise DepressedMonicEq(f,g) bound to the same f as in the claim."
    - "Require a verified premise GaloisGroup(g,G) bound to the same g as in the normalization premise and the same G as in the claim."
    - "Accept."

errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_TYPE
