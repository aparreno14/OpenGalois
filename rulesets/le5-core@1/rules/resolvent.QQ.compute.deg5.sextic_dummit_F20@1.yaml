id: resolvent.QQ.compute.deg5.sextic_dummit_F20@1
ruleset: le5-core@1

claim_pattern:
  pred: ResolventQQ
  args: [PolyQQ, PolyQQ, MPolyQQ]

premise_patterns:
  - pred: Degree
    bind:
      claim_arg_1: premise_arg_0
    constants:
      premise_arg_1:
        kind: IntZ
        value: "5"

evidence_schema: null

check_mode: recompute

checker:
  steps:
    - "Require a verified premise Degree(g,5) bound to the same g as the claim."
    - "Decode R canonically as a PolyQQ."
    - "Decode g canonically as a PolyQQ."
    - "Decode p canonically as an MPolyQQ."
    - "Require p to be exactly the canonical MPolyQQ for the Dummit F20 sextic family."
    - "Require g to be monic."
    - "Require the coefficient of x^4 in g to be 0."
    - "Write g(x) = x^5 + p*x^3 + q*x^2 + r*x + s."
    - "Recompute Dummit's sextic f20(x) exactly in QQ[x] from formula (2)."
    - "Accept iff the claimed R equals the recomputed sextic exactly in QQ[x]."

errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_TYPE
  - E_P_MISMATCH
  - E_NOT_MONIC
  - E_NOT_DEPRESSED
  - E_EXCEPTION
  - E_MISMATCH
