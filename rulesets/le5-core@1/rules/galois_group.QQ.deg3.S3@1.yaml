id: galois_group.QQ.deg3.S3@1
ruleset: le5-core@1

claim_pattern:
  pred: GaloisGroup
  args: [PolyQQ, GroupId]

premise_patterns:
  - pred: Degree
    bind:
      claim_arg_0: premise_arg_0
    constants:
      premise_arg_1:
        kind: IntZ
        value: "3"
  - pred: IrreducibleQQ
    bind:
      claim_arg_0: premise_arg_0
  - pred: DiscNonSquareQQ
    bind:
      claim_arg_0: premise_arg_0

evidence_schema: null

check_mode: theorem

checker:
  steps:
    - "Require verified premises Degree(f,3), IrreducibleQQ(f), DiscNonSquareQQ(f) bound to the same f as in the claim."
    - "Decode G as GroupId(system='smallgroup') and require (order,index)=(6,2) (S3)."
    - "Accept."
errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_TYPE
  - E_GROUP_MISMATCH
