id: galois_group.QQ.deg1.trivial@1
ruleset: le5-core@1

claim_pattern:
  pred: GaloisGroup
  args: [PolyQQ, GroupId]

premise_patterns:
  - pred: Degree
    bind:
      claim_arg_0: premise_arg_0
    constants:
      premise_arg_1:
        kind: IntZ
        value: "1"

evidence_schema: null

check_mode: recompute

checker:
  steps:
    - "Require a verified premise Degree(f, 1) bound to the same f as the claim."
    - "Decode f canonically as a PolyQQ."
    - "Decode G canonically as a GroupId (system='smallgroup')."
    - "Side condition (defensive): require deg(f) == 1. Reject otherwise."
    - "Require (G.order, G.index) == (1, 1)."
    - "Accept."

errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_TYPE
  - E_SIDE_CONDITION
  - E_GROUP_MISMATCH