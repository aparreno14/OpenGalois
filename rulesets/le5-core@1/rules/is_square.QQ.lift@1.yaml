id: is_square.QQ.lift@1
ruleset: le5-core@1

claim_pattern:
  pred: IsSquareQQ
  args: [RatQQ]

premise_patterns:
  - pred: SqrtQQ
    bind:
      claim_arg_0: premise_arg_0

evidence_schema: null

check_mode: theorem

checker:
  steps:
    - "Require a verified premise SqrtQQ(q,k) with the same q as in the claim."
    - "Accept."
errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_TYPE
