id: nonsolvable_by_radicals.QQ.from_galois_group@1
ruleset: le5-core@1

claim_pattern:
  pred: NonSolvableByRadicals
  args: [PolyQQ]

premise_patterns:
  - pred: GaloisGroup
    bind:
      claim_arg_0: premise_arg_0

evidence_schema: null

check_mode: theorem

checker:
  steps:
    - "Require the claim to be NonSolvableByRadicals(f)."
    - "Require a verified premise GaloisGroup(f,G) bound to the same polynomial f."
    - "Decode G canonically as GroupId(system='smallgroup')."
    - "Accept exactly for the non-resoluble groups supported by le5-core@1: A5 and S5."
    - "Reject otherwise."

errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_TYPE
  - E_GROUP_RESOLUBLE
  - E_GROUP_UNSUPPORTED
