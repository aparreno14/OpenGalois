id: galois_group.QQ.reducible.double_quadratic.V4@1
ruleset: le5-core@1

claim_pattern:
  pred: GaloisGroup
  args: [PolyQQ, GroupId]

premise_patterns:
  - pred: FactorizationMonicQQ
    bind:
      claim_arg_0: premise_arg_0
  - pred: Degree
  - pred: IrreducibleQQ
  - pred: Discriminant
  - pred: NonSquareQQ

evidence_schema: null

check_mode: theorem

checker:
  steps:
    - "Require a verified premise FactorizationMonicQQ(f,factors,unit) bound to the same f as in the claim."
    - "Decode factors as PolyQQList and form the list of distinct factor refs appearing in factors.items."
    - "Require that exactly two distinct factor refs q1,q2 have Degree(qi,2) and IrreducibleQQ(qi)."
    - "Require every remaining distinct factor ref l to satisfy Degree(l,1)."
    - "Require verified premises Discriminant(q1,d1) and Discriminant(q2,d2)."
    - "Require a verified premise NonSquareQQ(w) where w = d1*d2 exactly in QQ."
    - "Decode G canonically as GroupId(system='smallgroup') and require (order,index)=(4,2)."
    - "Accept."

errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_SIDE_CONDITION
  - E_TYPE
  - E_GROUP_MISMATCH
