id: galois_group.QQ.deg4.V4@3
ruleset: le5-core@1

claim_pattern:
  pred: GaloisGroup
  args: [PolyQQ, GroupId]

premise_patterns:
  - pred: Degree
    bind:
      claim_arg_0: premise_arg_0
    constants:
      premise_arg_1:
        kind: IntZ
        value: "4"
  - pred: IrreducibleQQ
    bind:
      claim_arg_0: premise_arg_0
  - pred: ResolventQQ
    bind:
      claim_arg_0: premise_arg_1
  - pred: FactorizationMonicQQ
    # bound indirectly: its first argument must match the R from ResolventQQ(R,f,p)
  - pred: Degree
    # one premise Degree(l_i,1) is required for each of the three factors l_i
    constants:
      premise_arg_1:
        kind: IntZ
        value: "1"

evidence_schema: null

check_mode: theorem

checker:
  steps:
    - "Require verified premises Degree(f,4) and IrreducibleQQ(f) bound to the same f as in the claim."
    - "Require a verified premise ResolventQQ(R,f,p) bound to the same f as in the claim."
    - "Require that p is exactly the canonical MPolyQQ object for (x1+x2)(x3+x4)."
    - "Require a verified premise FactorizationMonicQQ(R,factors,unit) for the same resolvent polynomial R."
    - "Require unit = 1 and factors to contain exactly three monic factor references."
    - "Require an explicit verified premise Degree(l_i,1) for each factor l_i listed in factors."
    - "Require each listed factor to decode as a monic linear PolyQQ."
    - "Decode G as GroupId(system='smallgroup') and require (order,index)=(4,2) (V4)."
    - "Accept."

errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_BAD_RESOLVENT_FAMILY
  - E_BAD_FACTORIZATION
  - E_TYPE
  - E_GROUP_MISMATCH
