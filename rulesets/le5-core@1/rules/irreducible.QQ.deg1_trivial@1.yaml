id: irreducible.QQ.deg1_trivial@1
ruleset: le5-core@1

claim_pattern:
  pred: IrreducibleQQ
  args: [PolyQQ]

premise_patterns:
  - pred: Degree
    bind:
      claim_arg_0: premise_arg_0
    constants:
      premise_arg_1:
        kind: IntZ
        value: "1"

evidence_schema: null

check_mode: trivial

checker:
  steps:
    - "Require a verified premise Degree(f,1) bound to the same f as the claim."
    - "Decode f (PolyQQ) canonically from $input or objects."
    - "Side condition (defensive): deg(f) == 1. Reject otherwise."
    - "Accept (every linear polynomial over Q is irreducible in Q[x])."

errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_TYPE
  - E_SIDE_CONDITION