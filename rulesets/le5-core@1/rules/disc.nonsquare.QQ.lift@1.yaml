id: disc.nonsquare.QQ.lift@1
ruleset: le5-core@1

claim_pattern:
  pred: DiscNonSquareQQ
  args: [PolyQQ]

premise_patterns:
  - pred: Discriminant
    bind:
      claim_arg_0: premise_arg_0
  - pred: NonSquareQQ
    # bound indirectly: its argument must match the D from Discriminant(f,D)

evidence_schema: null

check_mode: theorem

checker:
  steps:
    - "Require a verified premise Discriminant(f,D) with the same f as in the claim."
    - "Require a verified premise NonSquareQQ(D) for the same D obtained from Discriminant(f,D)."
    - "Accept."
errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_TYPE
