id: radical_roots.QQ.deg1.trivial@1
ruleset: le5-core@1

claim_pattern:
  pred: RadicalRoots
  args: [PolyQQ, RadicalExprList]

premise_patterns:
  - pred: Degree
    bind:
      claim_arg_0: premise_arg_0
    constants:
      premise_arg_1:
        kind: IntZ
        value: "1"

evidence_schema: null

check_mode: recompute

checker:
  steps:
    - "Require a verified premise Degree(f,1) bound to the same polynomial f as in the claim."
    - "Decode f canonically as a PolyQQ and defensively require deg(f)=1."
    - "If f(x)=ax+b with a != 0, recompute the canonical root expression as the one-element RadicalExprList [ qq((-b)/a) ]."
    - "Decode the claimed RadicalExprList and compare it to the recomputed list by exact structural equality of RadicalExpr payloads."
    - "Accept."

errors:
  - E_PREMISE_MISSING
  - E_PREMISE_BINDING
  - E_TYPE
  - E_SIDE_CONDITION
  - E_MISMATCH
