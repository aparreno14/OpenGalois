name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint and typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src

  tests:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Pytest
        run: pytest -q

  package:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Smoke-test wheel import
        run: |
          python -m venv /tmp/opengalois-wheel-test
          /tmp/opengalois-wheel-test/bin/python -m pip install -U pip
          /tmp/opengalois-wheel-test/bin/python -m pip install dist/*.whl
          /tmp/opengalois-wheel-test/bin/python - <<'PY'
          from opengalois import analyze, verify, render_explanation

          result = analyze([1, 0, -2])
          verification = verify(result.certificate)
          assert verification.verified
          rendered = render_explanation(result, format="md")
          assert isinstance(rendered, str)
          PY
